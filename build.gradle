plugins {
    id 'java'
    id 'application'
}

group 'edu.pucmm.eict'
version '1.0-SNAPSHOT'

java {
    sourceCompatibility = '25'
    targetCompatibility = '25'
}

application {
    mainClass = 'edu.pucmm.eict.Main'
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.jsoup:jsoup:1.15.3'
}

run {
    standardInput = System.in
}
